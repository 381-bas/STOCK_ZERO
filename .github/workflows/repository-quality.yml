name: Repository quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  governance-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: python -m pip install --requirement requirements-ci.txt
      - run: python scripts/sz_preflight.py --phase generic --root . --skip-db
      - run: python scripts/ci_repository_checks.py json
      - run: python scripts/ci_repository_checks.py encoding
      - run: python scripts/ci_repository_checks.py manifest
      - run: python scripts/run_test_group.py --group CI_CORE --list
      - name: Governance tests
        run: python -m unittest tests.test_kernel04_retirement tests.test_016B_kpione_identity_idempotency_contract tests.test_ci_quality_gates
      - name: Pull request diff whitespace
        if: github.event_name == 'pull_request'
        run: python scripts/ci_repository_checks.py diff --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}" --mode pull_request
      - name: Push diff whitespace
        if: github.event_name == 'push'
        run: python scripts/ci_repository_checks.py diff --base "${{ github.event.before }}" --head "${{ github.sha }}" --mode push

  safety-static:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python scripts/ci_repository_checks.py safety

  unit-core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: python -m pip install --requirement requirements-ci.txt
      - run: python scripts/run_test_group.py --group CI_CORE

  postgresql-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16.3-alpine
        env:
          POSTGRES_USER: stock_zero_ci
          POSTGRES_PASSWORD: stock_zero_ci
          POSTGRES_DB: stock_zero_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stock_zero_ci -d stock_zero_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_URL_CODEX_LOCAL: postgresql://stock_zero_ci:stock_zero_ci@127.0.0.1:5432/stock_zero_ci
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: python -m pip install --requirement requirements-ci.txt
      - run: python scripts/run_test_group.py --group CI_POSTGRESQL
